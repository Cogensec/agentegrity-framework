name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,crypto]"

      - name: Lint
        run: python -m ruff check src/ tests/

      - name: Type check
        run: python -m mypy src/agentegrity

      - name: Test
        run: python -m pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate long description
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/agentegrity/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agentegrity/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-npm:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install workspace
        run: bun install --frozen-lockfile
        working-directory: clients/typescript
      - name: Verify version parity
        run: bun run check-versions
        working-directory: clients/typescript
      - name: Build all packages
        run: bun run build
        working-directory: clients/typescript
      - name: Test all packages
        run: bun run test
        working-directory: clients/typescript
      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-workspace
          path: clients/typescript/

  publish-npm:
    needs: build-npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - client
          - claude-sdk
          - langchain
          - openai-agents
          - crewai
          - google-adk
          - vercel-ai
    environment:
      name: npm
      url: https://www.npmjs.com/package/@agentegrity/${{ matrix.package }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: ts-workspace
          path: clients/typescript/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish @agentegrity/${{ matrix.package }}
        run: npm publish --access public --provenance
        working-directory: clients/typescript/packages/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
